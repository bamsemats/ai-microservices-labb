# Core Observability Settings (Common)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# Metrics (Micrometer/Prometheus)
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-blocks.all=true
management.metrics.distribution.percentiles.all=0.5,0.75,0.95,0.99

# Tracing (Micrometer Tracing + OTLP)
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# Logging (Include Trace IDs)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
