# Core Observability Settings (Common)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized

# Metrics (Micrometer/Prometheus)
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.all=true
management.metrics.distribution.percentiles.all=0.5,0.75,0.95,0.99

# Tracing (Micrometer Tracing + OTLP)
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
# Disable OTLP export by default if no endpoint is explicitly provided in environment
management.otlp.tracing.export.enabled=${MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED:false}

# Logging (Include Trace IDs)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
