spring.config.import=optional:classpath:observability-defaults.properties

spring.application.name=ai-service
server.port=8084

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/aidb}

# OpenRouter Configuration
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.model=${OPENROUTER_MODEL:openrouter/auto}
openrouter.url=https://openrouter.ai/api/v1/chat/completions

