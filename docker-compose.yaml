services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.0
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "8082:8082"
      - "9090:9090"
    volumes:
      - ./certs:/app/certs:ro
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/userdb
      - JWT_SECRET=a-very-long-and-secure-secret-key-that-is-at-least-256-bits
      - ENCRYPTION_SECRET=another-very-long-and-secure-secret-key-32-chars
      - GRPC_SERVER_SECURITY_ENABLED=true
      - GRPC_SERVER_SECURITY_KEY_STORE=file:/app/certs/user-service.jks
      - GRPC_SERVER_SECURITY_KEY_STORE_PASSWORD=password
      - GRPC_SERVER_SECURITY_KEY_PASSWORD=password
      - GRPC_SERVER_SECURITY_TRUST_STORE=file:/app/certs/truststore.jks
      - GRPC_SERVER_SECURITY_TRUST_STORE_PASSWORD=password
      - GRPC_SERVER_SECURITY_CLIENT_AUTH=REQUIRE
    depends_on:
      mongodb:
        condition: service_started

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8091:8081"
    volumes:
      - ./certs:/app/certs:ro
    environment:
      - GRPC_CLIENT_USER_SERVICE_NEGOTIATION_TYPE=tls
      - SPRING_DATA_REDIS_HOST=redis
      - JWT_SECRET=a-very-long-and-secure-secret-key-that-is-at-least-256-bits
      - ENCRYPTION_SECRET=another-very-long-and-secure-secret-key-32-chars
      - GRPC_CLIENT_USER_SERVICE_SECURITY_ENABLED=true
      - GRPC_CLIENT_USER_SERVICE_SECURITY_KEY_STORE=file:/app/certs/auth-service.jks
      - GRPC_CLIENT_USER_SERVICE_SECURITY_KEY_STORE_PASSWORD=password
      - GRPC_CLIENT_USER_SERVICE_SECURITY_KEY_PASSWORD=password
      - GRPC_CLIENT_USER_SERVICE_SECURITY_TRUST_STORE=file:/app/certs/truststore.jks
      - GRPC_CLIENT_USER_SERVICE_SECURITY_TRUST_STORE_PASSWORD=password
    depends_on:
      user-service:
        condition: service_started
      redis:
        condition: service_healthy

  message-service:
    build:
      context: .
      dockerfile: message-service/Dockerfile
    ports:
      - "8083:8083"
    volumes:
      - ./certs:/app/certs:ro
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/messagedb
      - SPRING_RABBITMQ_HOST=rabbitmq
      - GRPC_CLIENT_USER_SERVICE_NEGOTIATION_TYPE=tls
      - JWT_SECRET=a-very-long-and-secure-secret-key-that-is-at-least-256-bits
      - ENCRYPTION_SECRET=another-very-long-and-secure-secret-key-32-chars
      - GRPC_CLIENT_USER_SERVICE_SECURITY_ENABLED=true
      - GRPC_CLIENT_USER_SERVICE_SECURITY_KEY_STORE=file:/app/certs/message-service.jks
      - GRPC_CLIENT_USER_SERVICE_SECURITY_KEY_STORE_PASSWORD=password
      - GRPC_CLIENT_USER_SERVICE_SECURITY_KEY_PASSWORD=password
      - GRPC_CLIENT_USER_SERVICE_SECURITY_TRUST_STORE=file:/app/certs/truststore.jks
      - GRPC_CLIENT_USER_SERVICE_SECURITY_TRUST_STORE_PASSWORD=password
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVICES_AUTH=http://auth-service:8081
      - SERVICES_USER=http://user-service:8082
      - SERVICES_MESSAGE=http://message-service:8083
      - JWT_SECRET=a-very-long-and-secure-secret-key-that-is-at-least-256-bits
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      message-service:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_started

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  mongodb_data:
  redis_data:
