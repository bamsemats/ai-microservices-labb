services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "8082:8082"
      - "9090:9090"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/userdb
    depends_on:
      - mongodb

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - GRPC_CLIENT_USER_SERVICE_ADDRESS=static://user-service:9090
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - user-service
      - redis

  message-service:
    build:
      context: .
      dockerfile: message-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/messagedb
      - SPRING_RABBITMQ_HOST=rabbitmq
      - GRPC_CLIENT_USER_SERVICE_ADDRESS=static://user-service:9090
    depends_on:
      - mongodb
      - rabbitmq
      - user-service

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVICES_AUTH=http://auth-service:8081
      - SERVICES_USER=http://user-service:8082
      - SERVICES_MESSAGE=http://message-service:8083
    depends_on:
      - auth-service
      - user-service
      - message-service

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq

volumes:
  mongodb_data:
