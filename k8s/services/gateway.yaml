apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: gateway
        image: gateway:latest
        imagePullPolicy: Never
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
        env: []
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: tmp-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
spec:
  rules:
  - http:
      paths:
      - path: /login
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /register
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /messages
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /analytics
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /refresh
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /logout
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
