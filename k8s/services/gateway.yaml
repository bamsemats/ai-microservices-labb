apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
      - name: gateway
        image: gateway:v1.0.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: adapta-secrets
              key: jwt-secret
        - name: SERVICES_AUTH
          value: http://auth-service:8080
        - name: SERVICES_USER
          value: http://user-service:8080
        - name: SERVICES_MESSAGE
          value: http://message-service:8080
        - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
          value: http://jaeger:4318/v1/traces
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: tmp-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - adapta-chat.local
    secretName: gateway-tls
  rules:
  - host: adapta-chat.local
    http:
      paths:
      - path: /login
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /register
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /messages
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /analytics
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /refresh
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /logout
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
