syntax = "proto3";

package com.example.labb_microservices.proto;

option java_multiple_files = true;
option java_package = "com.example.labb_microservices.proto";

service UserService {
  rpc ValidateCredentials(CredentialsRequest) returns (CredentialsResponse);
  rpc GetUserById(UserLookupRequest) returns (UserResponse);
}

message CredentialsRequest {
  string username = 1;
  string password = 2;
}

message CredentialsResponse {
  bool valid = 1;
  string userId = 2;
  string username = 3;
}

message UserLookupRequest {
  string userId = 1;
}

message UserResponse {
  string userId = 1;
  string username = 2;
  string email = 3;
  optional bool enabled = 4;
}
